# Server
server.port=${SERVER_PORT:8100}

# Main datasource
main.datasource.url=${MAIN_DATASOURCE_URL}
main.datasource.username=${MAIN_DATASOURCE_USERNAME}
main.datasource.password=${MAIN_DATASOURCE_PASSWORD}

# Tenant liquibase
tenant.liquibase.change-log=classpath:/com/company/pmsmain/liquibase/changelog.xml

# Disable dev mode
vaadin.devmode.enable=false
vaadin.productionMode=true

# Logging
logging.level.root=WARN
logging.level.com.company.pmsmain=INFO

app.reports.path=/app/reports
tenant.db.host-override=${TENANT_DB_HOST_OVERRIDE:}
stimulsoft.license-
vaadin.theme=pms-blue

# HelpDesk API endpoints (Zorin server — same host as the app)
helpdesk.chat.base-url=http://192.168.0.159:7863
helpdesk.support.base-url=http://192.168.0.159:7870
helpdesk.connect-timeout-ms=10000
helpdesk.read-timeout-ms=60000